ignore:
  resource_names:
      - AccountCustomization
      - AccountSubscription
      - Dashboard
      - Folder
      - FolderMembership
      - Group
      - GroupMembership
      - IAMPolicyAssignment
      - Ingestion
      - Namespace
      - RefreshSchedule
      - RoleMembership
      - Template
      - TemplateAlias
      - Theme
      - ThemeAlias
      - Topic
      - TopicRefreshSchedule
      - VPCConnection
      - Brand
      - ActionConnector
  field_paths:
      # RequestId is just the AWS API request ID for tracking, not resource data
      - CreateDataSourceOutput.RequestId
      - UpdateDataSourceOutput.RequestId
      - DeleteDataSourceOutput.RequestId
      - CreateDataSetOutput.RequestId
      - UpdateDataSetOutput.RequestId
      - DeleteDataSetOutput.RequestId
      - DescribeDataSetOutput.RequestId
      - CreateAnalysisOutput.RequestId
      - UpdateAnalysisOutput.RequestId
      - DeleteAnalysisOutput.RequestId
      # HTTP status codes are not useful for users
      - CreateDataSourceOutput.Status
      - UpdateDataSourceOutput.Status
      - DeleteDataSourceOutput.Status
      - DescribeDataSourceOutput.Status
      - CreateDataSetOutput.Status
      - UpdateDataSetOutput.Status
      - DeleteDataSetOutput.Status
      - DescribeDataSetOutput.Status
      - CreateAnalysisOutput.Status
      - UpdateAnalysisOutput.Status
      - DeleteAnalysisOutput.Status
      - DescribeAnalysisOutput.Status
      # RowLevelPermissionDataSet - deprecated
      - CreateDataSetInput.RowLevelPermissionDataSet
      - UpdateDataSetInput.RowLevelPermissionDataSet
      - DescribeDataSetOutput.RowLevelPermissionDataSet
      # LogicalTableMap - deprecated, only used in legacy data preparation experience
      - CreateDataSetInput.LogicalTableMap
      - UpdateDataSetInput.LogicalTableMap
      - DescribeDataSetOutput.LogicalTableMap
      # RowLevelPermissionTagConfiguration - deprecated, only used in legacy data preparation experience
      - CreateDataSetInput.RowLevelPermissionTagConfiguration
      - UpdateDataSetInput.RowLevelPermissionTagConfiguration
      - DescribeDataSetOutput.RowLevelPermissionTagConfiguration
      # Analysis Definition CRD size reduction - the Analysis CRD exceeds the
      # Kubernetes API server limit (8.1MB) due to deeply fields. Ignoring sheets and FilterGroups reduces size below limits
      # Remove support for inline definition and only support template definition. 
      - CreateAnalysisInput.Definition
      - UpdateAnalysisInput.Definition

operations:
  DescribeDataSource:
    output_wrapper_field_path: DataSource
  DescribeDataSet:
    output_wrapper_field_path: DataSet
  DescribeAnalysis:
    output_wrapper_field_path: Analysis

empty_shapes:
  - AxisDisplayDataDrivenRange
  - AllSheetsFilterScopeConfiguration

resources:
  Analysis:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.Status
          in:
            - CREATION_SUCCESSFUL
            - UPDATE_SUCCESSFUL
    renames:
      operations:
        CreateAnalysis:
          input_fields:
            AnalysisId: ID
          output_fields:
            CreationStatus: Status
        UpdateAnalysis:
          input_fields:
            AnalysisId: ID
          output_fields:
            UpdateStatus: Status
        DeleteAnalysis:
          input_fields:
            AnalysisId: ID
        DescribeAnalysis:
          input_fields:
            AnalysisId: ID
    fields:
      # Primary identifiers
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      # Status fields from DescribeAnalysis
      Status:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.Status
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.LastUpdatedTime
      Errors:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.Errors
      Errors.Type:
        go_tag: json:"type,omitempty"
      SourceEntity.SourceTemplate.DataSetReferences.DataSetARN:
        references:
          resource: DataSet
          path: Status.ACKResourceMetadata.ARN
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/analysis/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/analysis/sdk_read_one_post_set_output.go.tpl
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
  DataSet:
    ignore_idempotency_token: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
    renames:
      operations:
        CreateDataSet:
          input_fields:
            DataSetId: ID
            DataSetUsageConfiguration: UsageConfiguration
            DatasetParameters: Parameters
          output_fields:
            DataSetId: ID
        UpdateDataSet:
          input_fields:
            DataSetId: ID
            DataSetUsageConfiguration: UsageConfiguration
            DatasetParameters: Parameters
          output_fields:
            DataSetId: ID
        DeleteDataSet:
          input_fields:
            DataSetId: ID
        DescribeDataSet:
          input_fields:
            DataSetId: ID
    fields:
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      ConsumedSpiceCapacityInBytes:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.ConsumedSpiceCapacityInBytes
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.LastUpdatedTime
      OutputColumns:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.OutputColumns
      OutputColumns.Type:
        go_tag: json:"type,omitempty"
      PhysicalTableMap.RelationalTable.InputColumns.Type:
        go_tag: json:"type,omitempty"
      DataPrepConfiguration.TransformStepMap.JoinStep.Type:
        go_tag: json:"type,omitempty"
      # Cross-resource references for DataSource ARN in physical tables
      # NOTE: These are nested inside map types (PhysicalTableMap).
      # PhysicalTableMap.CustomSQL.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.RelationalTable.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.S3Source.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.SaaSTable.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/data_set/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/data_set/sdk_read_one_post_set_output.go.tpl
  DataSource:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.Status
          in:
            - CREATION_SUCCESSFUL
            - UPDATE_SUCCESSFUL
    renames:
      operations:
        CreateDataSource:
          input_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
          output_fields:
            CreationStatus: Status
        UpdateDataSource:
          input_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
          output_fields:
            UpdateStatus: Status
        DeleteDataSource:
          input_fields:
            DataSourceId: ID
        DescribeDataSource:
          input_fields:
            DataSourceId: ID
          output_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
    fields:
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      Type:
        is_immutable: true
        go_tag: json:"type,omitempty"
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.LastUpdatedTime
      ErrorInfo:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.ErrorInfo
      ErrorInfo.Type:
        go_tag: json:"type,omitempty"
      Status:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.Status
      # Cross-resource references for IAM Roles
      Parameters.AthenaParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.S3Parameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.S3KnowledgeBaseParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.RedshiftParameters.IAMParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference for Secrets Manager
      Credentials.SecretARN:
        references:
          service_name: secretsmanager
          resource: Secret
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference for RDS DBInstance
      Parameters.RdsParameters.InstanceID:
        references:
          service_name: rds
          resource: DBInstance
          path: Spec.DBInstanceIdentifier
      # Cross-resource reference for S3 Bucket
      Parameters.S3Parameters.ManifestFileLocation.Bucket:
        references:
          service_name: s3
          resource: Bucket
          path: Spec.Name
      # Secret fields - sensitive credentials that should be stored in K8s Secrets
      Credentials.CredentialPair.Password:
        is_secret: true
      Credentials.KeyPairCredentials.PrivateKey:
        is_secret: true
      Credentials.KeyPairCredentials.PrivateKeyPassphrase:
        is_secret: true
      Credentials.WebProxyCredentials.WebProxyPassword:
        is_secret: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/data_source/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/data_source/sdk_read_one_post_set_output.go.tpl