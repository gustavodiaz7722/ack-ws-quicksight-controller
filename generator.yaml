ignore:
  resource_names:
      - AccountCustomization
      - AccountSubscription
      - Folder
      - FolderMembership
      - Group
      - GroupMembership
      - IAMPolicyAssignment
      - Ingestion
      - Namespace
      - RefreshSchedule
      - RoleMembership
      - Template
      - TemplateAlias
      - Theme
      - ThemeAlias
      - Topic
      - TopicRefreshSchedule
      - VPCConnection
      - Brand
      - ActionConnector
  field_paths:
      # RequestId is just the AWS API request ID for tracking, not resource data
      - CreateDataSourceOutput.RequestId
      - UpdateDataSourceOutput.RequestId
      - DeleteDataSourceOutput.RequestId
      - CreateDataSetOutput.RequestId
      - UpdateDataSetOutput.RequestId
      - DeleteDataSetOutput.RequestId
      - DescribeDataSetOutput.RequestId
      - CreateAnalysisOutput.RequestId
      - UpdateAnalysisOutput.RequestId
      - DeleteAnalysisOutput.RequestId
      - CreateDashboardOutput.RequestId
      - UpdateDashboardOutput.RequestId
      - DeleteDashboardOutput.RequestId
      - DescribeDashboardOutput.RequestId
      # HTTP status codes are not useful for users
      - CreateDataSourceOutput.Status
      - UpdateDataSourceOutput.Status
      - DeleteDataSourceOutput.Status
      - DescribeDataSourceOutput.Status
      - CreateDataSetOutput.Status
      - UpdateDataSetOutput.Status
      - DeleteDataSetOutput.Status
      - DescribeDataSetOutput.Status
      - CreateAnalysisOutput.Status
      - UpdateAnalysisOutput.Status
      - DeleteAnalysisOutput.Status
      - DescribeAnalysisOutput.Status
      - CreateDashboardOutput.Status
      - UpdateDashboardOutput.Status
      - DeleteDashboardOutput.Status
      - DescribeDashboardOutput.Status
      # RowLevelPermissionDataSet - deprecated
      - CreateDataSetInput.RowLevelPermissionDataSet
      - UpdateDataSetInput.RowLevelPermissionDataSet
      - DescribeDataSetOutput.RowLevelPermissionDataSet
      # LogicalTableMap - deprecated, only used in legacy data preparation experience
      - CreateDataSetInput.LogicalTableMap
      - UpdateDataSetInput.LogicalTableMap
      - DescribeDataSetOutput.LogicalTableMap
      # RowLevelPermissionTagConfiguration - deprecated, only used in legacy data preparation experience
      - CreateDataSetInput.RowLevelPermissionTagConfiguration
      - UpdateDataSetInput.RowLevelPermissionTagConfiguration
      - DescribeDataSetOutput.RowLevelPermissionTagConfiguration
      # Analysis Definition CRD size reduction - the Analysis CRD exceeds the
      # Kubernetes API server limit (8.1MB) due to deeply fields. Ignoring sheets and FilterGroups reduces size below limits
      # Remove support for inline definition and only support template definition. 
      - CreateAnalysisInput.Definition
      - UpdateAnalysisInput.Definition
      # Dashboard Definition CRD size reduction - the Analysis CRD exceeds the
      # Ignoring sheets and FilterGroups reduces size below limits
      - CreateDashboardInput.Definition
      - UpdateDashboardInput.Definition
      # Do not send VersionNumber to DescribeDashboard. ack-generate auto-wires
      # Status.VersionNumber to DescribeDashboardInput.VersionNumber because the
      # field names match, but that makes the describe version-scoped and
      # returns Dashboard.Arn with a /version/N suffix (which TagResource
      # rejects as an invalid ARN). Always describe the latest published version.
      - DescribeDashboardInput.VersionNumber
      # Same auto-wiring issue applies to DeleteDashboard. Passing VersionNumber
      # would delete only that version; AWS rejects deleting a published version
      # with ConflictException. Always delete the dashboard in full.
      - DeleteDashboardInput.VersionNumber

operations:
  DescribeDataSource:
    output_wrapper_field_path: DataSource
  DescribeDataSet:
    output_wrapper_field_path: DataSet
  DescribeAnalysis:
    output_wrapper_field_path: Analysis
  DescribeDashboard:
    output_wrapper_field_path: Dashboard

empty_shapes:
  - AxisDisplayDataDrivenRange
  - AllSheetsFilterScopeConfiguration

resources:
  Dashboard:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.VersionStatus
          in:
            - CREATION_SUCCESSFUL
            - UPDATE_SUCCESSFUL
    renames:
      operations:
        CreateDashboard:
          input_fields:
            DashboardId: ID
            DashboardPublishOptions: PublishOptions
          output_fields:
            DashboardId: ID
        UpdateDashboard:
          input_fields:
            DashboardId: ID
            DashboardPublishOptions: PublishOptions
          output_fields:
            DashboardId: ID
        DeleteDashboard:
          input_fields:
            DashboardId: ID
        DescribeDashboard:
          input_fields:
            DashboardId: ID
    fields:
      # Primary identifiers
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      # FolderARNs is create-only. After creation, folder membership is
      # managed via CreateFolderMembership/DeleteFolderMembership on the
      # folder side. DescribeDashboard does not return folder membership.
      FolderARNs:
        is_immutable: true
      # Status fields from DescribeDashboard
      # Flat scalar mirrors of the published Dashboard.Version so the
      # synced sentinel can reference a scalar and we avoid a nested
      # DashboardVersion struct in status. VersionStatus drives the
      # synced-state check; VersionNumber is used by UpdateDashboardPublishedVersion.
      VersionStatus:
        is_read_only: true
        from:
          operation: DescribeDashboard
          path: Dashboard.Version.Status
      VersionNumber:
        is_read_only: true
        from:
          operation: DescribeDashboard
          path: Dashboard.Version.VersionNumber
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeDashboard
          path: Dashboard.CreatedTime
      LastPublishedTime:
        is_read_only: true
        from:
          operation: DescribeDashboard
          path: Dashboard.LastPublishedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeDashboard
          path: Dashboard.LastUpdatedTime
      # Cross-resource reference to DataSet for source template dataset placeholders
      SourceEntity.SourceTemplate.DataSetReferences.DataSetARN:
        references:
          resource: DataSet
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference to Analysis for linked entities
      LinkEntities:
        references:
          resource: Analysis
          path: Status.ACKResourceMetadata.ARN
      # SourceEntity comparison is handled in the delta_post_compare hook
      # because DescribeDashboard returns SourceEntityArn with a /version/N
      # suffix that may not match the user-provided ARN.
      SourceEntity:
        compare:
          is_ignored: true
      # Permissions and LinkSharingConfiguration are managed via the
      # separate UpdateDashboardPermissions API. Comparison and sync
      # are handled in custom hooks.
      Permissions:
        compare:
          is_ignored: true
      LinkSharingConfiguration:
        compare:
          is_ignored: true
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/dashboard/sdk_update_pre_build_request.go.tpl
      sdk_update_post_set_output:
        template_path: hooks/dashboard/sdk_update_post_set_output.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/dashboard/sdk_read_one_post_set_output.go.tpl
      delta_post_compare:
        template_path: hooks/dashboard/delta_post_compare.go.tpl
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
  Analysis:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.Status
          in:
            - CREATION_SUCCESSFUL
            - UPDATE_SUCCESSFUL
    renames:
      operations:
        CreateAnalysis:
          input_fields:
            AnalysisId: ID
          output_fields:
            CreationStatus: Status
        UpdateAnalysis:
          input_fields:
            AnalysisId: ID
          output_fields:
            UpdateStatus: Status
        DeleteAnalysis:
          input_fields:
            AnalysisId: ID
        DescribeAnalysis:
          input_fields:
            AnalysisId: ID
    fields:
      # Primary identifiers
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      # Status fields from DescribeAnalysis
      Status:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.Status
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.LastUpdatedTime
      Errors:
        is_read_only: true
        from:
          operation: DescribeAnalysis
          path: Analysis.Errors
      Errors.Type:
        go_tag: json:"type,omitempty"
      SourceEntity.SourceTemplate.DataSetReferences.DataSetARN:
        references:
          resource: DataSet
          path: Status.ACKResourceMetadata.ARN
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/analysis/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/analysis/sdk_read_one_post_set_output.go.tpl
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
  DataSet:
    ignore_idempotency_token: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
    renames:
      operations:
        CreateDataSet:
          input_fields:
            DataSetId: ID
            DataSetUsageConfiguration: UsageConfiguration
            DatasetParameters: Parameters
          output_fields:
            DataSetId: ID
        UpdateDataSet:
          input_fields:
            DataSetId: ID
            DataSetUsageConfiguration: UsageConfiguration
            DatasetParameters: Parameters
          output_fields:
            DataSetId: ID
        DeleteDataSet:
          input_fields:
            DataSetId: ID
        DescribeDataSet:
          input_fields:
            DataSetId: ID
    fields:
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      ConsumedSpiceCapacityInBytes:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.ConsumedSpiceCapacityInBytes
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.LastUpdatedTime
      OutputColumns:
        is_read_only: true
        from:
          operation: DescribeDataSet
          path: DataSet.OutputColumns
      OutputColumns.Type:
        go_tag: json:"type,omitempty"
      PhysicalTableMap.RelationalTable.InputColumns.Type:
        go_tag: json:"type,omitempty"
      DataPrepConfiguration.TransformStepMap.JoinStep.Type:
        go_tag: json:"type,omitempty"
      # Cross-resource references for DataSource ARN in physical tables
      # NOTE: These are nested inside map types (PhysicalTableMap).
      # PhysicalTableMap.CustomSQL.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.RelationalTable.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.S3Source.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
      # PhysicalTableMap.SaaSTable.DataSourceARN:
      #   references:
      #     resource: DataSource
      #     path: Status.ACKResourceMetadata.ARN
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/data_set/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/data_set/sdk_read_one_post_set_output.go.tpl
  DataSource:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.Status
          in:
            - CREATION_SUCCESSFUL
            - UPDATE_SUCCESSFUL
    renames:
      operations:
        CreateDataSource:
          input_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
          output_fields:
            CreationStatus: Status
        UpdateDataSource:
          input_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
          output_fields:
            UpdateStatus: Status
        DeleteDataSource:
          input_fields:
            DataSourceId: ID
        DescribeDataSource:
          input_fields:
            DataSourceId: ID
          output_fields:
            DataSourceId: ID
            DataSourceParameters: Parameters
    fields:
      ID:
        is_primary_key: true
        is_immutable: true
      AwsAccountId:
        is_immutable: true
      Type:
        is_immutable: true
        go_tag: json:"type,omitempty"
      CreatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.CreatedTime
      LastUpdatedTime:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.LastUpdatedTime
      ErrorInfo:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.ErrorInfo
      ErrorInfo.Type:
        go_tag: json:"type,omitempty"
      Status:
        is_read_only: true
        from:
          operation: DescribeDataSource
          path: DataSource.Status
      # Cross-resource references for IAM Roles
      Parameters.AthenaParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.S3Parameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.S3KnowledgeBaseParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      Parameters.RedshiftParameters.IAMParameters.RoleARN:
        references:
          service_name: iam
          resource: Role
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference for Secrets Manager
      Credentials.SecretARN:
        references:
          service_name: secretsmanager
          resource: Secret
          path: Status.ACKResourceMetadata.ARN
      # Cross-resource reference for RDS DBInstance
      Parameters.RdsParameters.InstanceID:
        references:
          service_name: rds
          resource: DBInstance
          path: Spec.DBInstanceIdentifier
      # Cross-resource reference for S3 Bucket
      Parameters.S3Parameters.ManifestFileLocation.Bucket:
        references:
          service_name: s3
          resource: Bucket
          path: Spec.Name
      # Secret fields - sensitive credentials that should be stored in K8s Secrets
      Credentials.CredentialPair.Password:
        is_secret: true
      Credentials.KeyPairCredentials.PrivateKey:
        is_secret: true
      Credentials.KeyPairCredentials.PrivateKeyPassphrase:
        is_secret: true
      Credentials.WebProxyCredentials.WebProxyPassword:
        is_secret: true
    exceptions:
      errors:
        404:
          code: ResourceNotFoundException
      terminal_codes:
        - InvalidParameterValueException
        - UnsupportedUserEditionException
    hooks:
      sdk_update_pre_build_request:
        template_path: hooks/data_source/sdk_update_pre_build_request.go.tpl
      sdk_read_one_post_set_output:
        template_path: hooks/data_source/sdk_read_one_post_set_output.go.tpl