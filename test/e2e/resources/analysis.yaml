apiVersion: quicksight.services.k8s.aws/v1alpha1
kind: Analysis
metadata:
  name: $ANALYSIS_NAME
spec:
  awsAccountID: "$AWS_ACCOUNT_ID"
  id: $ANALYSIS_ID
  name: $ANALYSIS_NAME
  sourceEntity:
    sourceTemplate:
      arn: $TEMPLATE_ARN
      dataSetReferences:
        - dataSetARN: $DATA_SET_ARN
          dataSetPlaceholder: testDataSet
  tags:
    - key: environment
      value: test
