apiVersion: quicksight.services.k8s.aws/v1alpha1
kind: Dashboard
metadata:
  name: $DASHBOARD_NAME
  annotations:
    services.k8s.aws/adoption-policy: adopt
    services.k8s.aws/adoption-fields: '{"awsAccountID": "$AWS_ACCOUNT_ID", "id": "$DASHBOARD_ID"}'
    services.k8s.aws/deletion-policy: retain
